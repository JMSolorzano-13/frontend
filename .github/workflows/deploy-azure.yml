# Build Vite app and deploy to Azure Static Web Apps (FastAPI / siigofiscal stack only).
# Repo: https://github.com/JMSolorzano-13/frontend
#
# GitHub: Settings → Environments → create environment named exactly: azure-siigofiscal
#   Secret:  AZURE_STATIC_WEB_APPS_API_TOKEN  (Terraform output frontend_sensitive.api_key)
#   Variables (not Secrets): VITE_* — baked into the bundle; see TECH_STACK.md
#   Optional: SWA_ORIGIN_FOR_CORS_SMOKE = full Origin only, e.g. https://<name>.<n>.azurestaticapps.net
#   (must match ACA FASTAPI_CORS_ORIGINS exactly — do not append .azurestaticapps.net twice)

name: Deploy Azure (SWA) — FastAPI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: azure-siigofiscal
    concurrency:
      group: swa-deploy-siigofiscal-fastapi
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-node@v4
        with:
          node-version: "18.15.0"
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install and build
        env:
          VITE_REACT_APP_BASE_URL: ${{ vars.VITE_REACT_APP_BASE_URL }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_SKIP_B2C: ${{ vars.VITE_SKIP_B2C }}
          VITE_APP_LOGO_URL: ${{ vars.VITE_APP_LOGO_URL }}
          VITE_COGNITO_URL: ${{ vars.VITE_COGNITO_URL }}
        run: yarn install --frozen-lockfile && yarn build

      - name: CORS preflight smoke (optional)
        if: ${{ vars.SWA_ORIGIN_FOR_CORS_SMOKE != '' }}
        env:
          API_BASE: ${{ vars.VITE_REACT_APP_BASE_URL }}
          ORIGIN: ${{ vars.SWA_ORIGIN_FOR_CORS_SMOKE }}
        run: |
          set -euo pipefail
          # Fix common copy-paste: ...azurestaticapps.net.azurestaticapps.net
          while [[ "$ORIGIN" == *azurestaticapps.net.azurestaticapps.net* ]]; do
            ORIGIN="${ORIGIN/.azurestaticapps.net.azurestaticapps.net/.azurestaticapps.net}"
          done
          url="${API_BASE%/}/status/health/api"
          echo "OPTIONS $url (Origin: $ORIGIN)"
          curl -sS -D /tmp/cors_headers.txt -o /dev/null -X OPTIONS "$url" \
            -H "Origin: $ORIGIN" \
            -H "Access-Control-Request-Method: GET"
          grep -iE '^(access-control-allow-origin|access-control-allow-credentials):' /tmp/cors_headers.txt \
            || { echo "Missing CORS allow headers; ensure ACA has FASTAPI_CORS_ORIGINS (siigofiscal Terraform sets it from SWA hostname)."; cat /tmp/cors_headers.txt; exit 1; }

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          api_location: ""
          output_location: ""
          skip_app_build: true
