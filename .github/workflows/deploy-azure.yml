# Build Vite app and deploy to Azure Static Web Apps.
# Repo: https://github.com/JMSolorzano-13/frontend
#
# Secret (Actions → Secrets): AZURE_STATIC_WEB_APPS_API_TOKEN — SWA deploy key from terraform output frontend_sensitive.
# Variables (Actions → Variables, not Secrets): VITE_* below — workflow uses vars.*; values are baked into the public JS bundle.
#   VITE_REACT_APP_BASE_URL — https://<backend_ingress_fqdn>/api (stable hostname; do not use revision-only FQDN).
#   VITE_COGNITO_CLIENT_ID, VITE_SKIP_B2C, VITE_APP_LOGO_URL; optional VITE_COGNITO_URL when not skipping B2C.

name: Deploy Azure (SWA)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-node@v4
        with:
          node-version: "18.15.0"
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install and build
        env:
          VITE_REACT_APP_BASE_URL: ${{ vars.VITE_REACT_APP_BASE_URL }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_SKIP_B2C: ${{ vars.VITE_SKIP_B2C }}
          VITE_APP_LOGO_URL: ${{ vars.VITE_APP_LOGO_URL }}
          VITE_COGNITO_URL: ${{ vars.VITE_COGNITO_URL }}
        run: yarn install --frozen-lockfile && yarn build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          api_location: ""
          output_location: ""
          skip_app_build: true
